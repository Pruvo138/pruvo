# pruvo-onizleme — sari seri 3D onizleme worker'i (tools/paket-onizleme-3d.md, Faz C).
# pruvo-shop'tan TAMAMEN AYRI worker: odeme izolasyonuna derleme yuku sokulmaz.
# Deploy: onizleme/ icinde `npx wrangler deploy` (route ayni alan adindan sunar,
# CORS gerekmez). DIKKAT: deploy MIMAR onayli adimdir — derleme arka ucu olmadan
# uc 503 doner; kabul 4e/4g icin Container bekleniyor.
name = "pruvo-onizleme"
main = "src/index.js"
compatibility_date = "2026-07-01"

routes = [
  { pattern = "pruvo3d.com/api/onizleme/*", zone_name = "pruvo3d.com" }
]

[vars]
SITE_URL = "https://pruvo3d.com"
# DO ad anahtari: rollout DO-container atamasini koparirsa buradan artirilir
# (16 Tem Faz D olayi — derleyici.js'teki nota bak).
DERLEYICI_AD = "derleyici-2"
# DERLEYICI_URL yalniz YEREL gelistirmede kullanilir (wrangler dev --var ile verilir);
# uretimde derleme arka ucu DERLEYICI binding'idir (asagidaki containers blogu).

[[r2_buckets]]
binding = "ONBELLEK"
bucket_name = "pruvo-onizleme"

[observability]
enabled = true

# ---------------------------------------------------------------------------
# CLOUDFLARE CONTAINERS (Workers Paid aktif, 16 Tem). Imaj CI'da derlenir+itilir:
# .github/workflows/onizleme-imaj.yml (elle tetik, push_et=true). Yerel `wrangler
# dev` bu bloklarla Docker ister — kabul testleri bu yuzden kendi kopyasinda
# containers'siz calisir (onizleme/test/kabul.js kendi gecici toml'unu uretir).
[[containers]]
class_name = "OnizlemeDerleyici"
# DIGEST'e sabit (":ci" tag'i DEGIL): tag mutable oldugundan ayni tag'e yeni push
# rollout tetiklemiyor — 16 Tem'de olculdu (uygulama version 1'de kaldi, eski imaj
# calismaya devam etti). Yeni imaj = CI logundaki yeni digest'i buraya yaz + deploy.
image = "registry.cloudflare.com/dbbe2a8620c3c3a57c586b8a98142fb9/pruvo-onizleme-derleyici@sha256:bfcb49c2f15909dd9181ae97fc2952c35e4845ff170933318bf03a3c9fd6d3c3"
max_instances = 2
# 1/4 vCPU + 1 GiB: OpenSCAD derlemesi CPU isi; en kucuk tip (1/16 vCPU) olcumde
# yavas kalirsa buradan buyutulur (kapi-1 raporuna bak).
instance_type = "basic"

[[durable_objects.bindings]]
name = "DERLEYICI"
class_name = "OnizlemeDerleyici"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OnizlemeDerleyici"]
# ---------------------------------------------------------------------------
