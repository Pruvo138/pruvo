# panelden yukseltecek). Plan aktiflesince asagisi acilir + src/index.js'e
# Container sinifi (durable object) eklenir; adaptor tek dosya: src/derleyici.js.
# Imaj CI'da derlenir: .github/workflows/onizleme-imaj.yml (elle tetik).
