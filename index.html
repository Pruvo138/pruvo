<style>
  :root{
    --navy:#12294d;        /* ana renk - lacivert */
    --navy-2:#1c3a6b;      /* açık lacivert */
    --navy-dark:#0d1e3a;   /* koyu lacivert */
    --gray-bg:#eef1f5;     /* arka plan gri */
    --gray-card:#ffffff;   /* kart */
    --gray-line:#d7dde6;   /* çizgi/kenar */
    --gray-text:#5b6675;   /* ikincil metin */
    --red:#d1332e;         /* aksan - az kullan */
    --red-dark:#b12723;
    --radius:10px;
    --shadow:0 2px 10px rgba(18,41,77,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--gray-bg);
    color:var(--navy);
    line-height:1.5;
  }

  /* ---------- HEADER ---------- */
  header{
    background:var(--navy);
    color:#fff;
    padding:26px 20px 0;
    box-shadow:var(--shadow);
  }
  .header-inner{max-width:1100px;margin:0 auto}
  .brand{
    font-size:44px;
    font-weight:800;
    letter-spacing:3px;
    line-height:1;
    color:#fff;
  }
  .brand-sub{
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#b9c6dc;
    margin-top:6px;
  }
  /* kategori menüsü */
  nav.cats{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:20px;
    padding-bottom:0;
  }
  .cat-btn{
    background:transparent;
    color:#cdd8ea;
    border:none;
    border-bottom:3px solid transparent;
    padding:10px 14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.15s;
  }
  .cat-btn:hover{color:#fff}
  .cat-btn.active{
    color:#fff;
    border-bottom-color:var(--red);   /* aktif kategori = kırmızı vurgu */
  }

  /* ---------- MAIN ---------- */
  main{max-width:1100px;margin:0 auto;padding:28px 20px 60px}

  .brand-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px 10px;
    margin-bottom:18px;
  }
  .brand-label{
    font-size:12px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--gray-text);
  }
  .brand-chips{display:flex;flex-wrap:wrap;gap:8px}
  .brand-btn{
    background:var(--gray-card);
    color:var(--navy);
    border:1px solid var(--gray-line);
    border-radius:20px;
    padding:6px 13px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition:.15s;
  }
  .brand-btn:hover{border-color:var(--navy-2)}
  .brand-btn.active{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }

  .section-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:18px;
    color:var(--navy);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:20px;
  }

  .card{
    background:var(--gray-card);
    border:1px solid var(--gray-line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:var(--shadow);
    transition:transform .15s, box-shadow .15s;
    cursor:pointer;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(18,41,77,.14)}

  .card-img{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    background:#dbe2ec;
    display:block;
  }
  .card-body{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
  .card-cat{
    display:inline-block;
    align-self:flex-start;
    background:var(--navy);
    color:#fff;
    font-size:11px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
    padding:3px 9px;
    border-radius:20px;
    margin-bottom:9px;
  }
  .card-title{font-size:16px;font-weight:700;margin-bottom:6px}
  .card-desc{font-size:13.5px;color:var(--gray-text);flex:1;margin-bottom:12px}
  .card-price{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:12px}
  .card-price.empty{color:var(--gray-text);font-weight:600;font-size:13px}

  .order-btn{
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:11px;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    text-decoration:none;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    transition:.15s;
  }
  .order-btn:hover{background:var(--red-dark)}
  .order-btn svg{width:17px;height:17px;fill:#fff}

  .empty-state{
    text-align:center;
    color:var(--gray-text);
    padding:60px 20px;
    font-size:15px;
  }

  /* ---------- ÜRÜN DETAY PENCERESİ (MODAL) ---------- */
  .modal-overlay{
    display:none;
    position:fixed;inset:0;z-index:100;
    background:rgba(13,30,58,.66);
    padding:20px;overflow-y:auto;
  }
  .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
  .modal{
    background:#fff;border-radius:14px;
    max-width:760px;width:100%;margin:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    overflow:hidden;position:relative;
  }
  .modal-close{
    position:absolute;top:12px;right:12px;z-index:2;
    width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.92);border:1px solid var(--gray-line);
    font-size:22px;line-height:1;cursor:pointer;color:var(--navy);
    display:flex;align-items:center;justify-content:center;
  }
  .modal-close:hover{background:#fff;color:var(--red)}
  .modal-img{
    width:100%;max-height:440px;object-fit:contain;
    background:#eef1f5;display:block;
  }
  .modal-thumbs{display:flex;gap:8px;flex-wrap:wrap;padding:12px 26px 0}
  .modal-thumb{
    width:62px;height:62px;object-fit:cover;border-radius:8px;
    border:2px solid transparent;cursor:pointer;background:#eef1f5;
  }
  .modal-thumb:hover{border-color:var(--gray-line)}
  .modal-thumb.active{border-color:var(--navy)}
  .modal-body{padding:24px 26px 28px}
  .modal-title{font-size:24px;font-weight:800;margin:12px 0 8px;color:var(--navy)}
  .modal-price{font-size:22px;font-weight:800;color:var(--navy);margin:6px 0 18px}
  .modal-price.empty{font-size:15px;font-weight:600;color:var(--gray-text)}
  .modal-desc{
    font-size:15px;color:#39434f;line-height:1.65;
    margin-bottom:24px;white-space:pre-wrap;
  }
  .modal .order-btn{max-width:280px;font-size:16px;padding:14px}
  @media (max-width:520px){
    .modal-body{padding:18px 18px 22px}
    .modal-title{font-size:20px}
    .modal .order-btn{max-width:none}
  }

  /* ---------- FOOTER ---------- */
  footer{
    background:var(--navy-dark);
    color:#aeb9cd;
    text-align:center;
    padding:22px 20px;
    font-size:13.5px;
    letter-spacing:.5px;
  }

  @media (max-width:520px){
    .brand{font-size:34px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}

  // WhatsApp ikonu + sipariş linki
  var WA_ICON = '<svg viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm5.8 14.13c-.24.68-1.42 1.31-1.96 1.35-.5.05-.98.24-3.3-.69-2.77-1.09-4.56-3.9-4.7-4.08-.14-.19-1.12-1.49-1.12-2.84 0-1.35.71-2.02.96-2.29.24-.27.53-.34.71-.34.18 0 .35 0 .51.01.16.01.38-.06.6.46.24.56.79 1.94.86 2.08.07.14.12.31.02.5-.09.19-.14.31-.28.48-.14.17-.29.37-.42.5-.14.14-.28.29-.12.57.16.28.72 1.18 1.54 1.91 1.06.94 1.95 1.24 2.23 1.38.28.14.44.12.6-.07.16-.19.69-.8.87-1.08.18-.28.36-.23.6-.14.24.09 1.55.73 1.81.86.27.14.45.21.51.32.06.11.06.64-.18 1.32z"/></svg>';
  // sitenin bu ürüne doğrudan linki (#urun=<id>) — canlıda gerçek adres olur
  function productUrl(p){
    return location.href.split("#")[0] + "#urun=" + p.id;
  }
  function waHref(p){
    var mesaj = "Merhaba, şu ürünle ilgileniyorum: " + p.baslik + "\n" + productUrl(p);
    return "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(mesaj);
  }

  // ürünün görsel listesi: gorseller doluysa onu, yoksa yer tutucu
  function imagesOf(p){
    if(p.gorseller && p.gorseller.length){ return p.gorseller; }
    return [phData(p.kategori)];
  }
  function coverOf(p){ return imagesOf(p)[0]; }

  var activeCat = "Tümü";
  var activeBrand = "Tümü";

  // ---------- MARKA FİLTRESİ ----------
  // ürünlerdeki tüm markaları tekilleştirip alfabetik sırala (elle liste tutmaya gerek yok)
  function allBrands(){
    var seen = {};
    var list = [];
    PRODUCTS.forEach(function(p){
      (p.marka || []).forEach(function(b){
        if(!seen[b]){ seen[b] = true; list.push(b); }
      });
    });
    return list.sort(function(a, b){ return a.localeCompare(b, "tr"); });
  }
  function renderBrands(){
    var el = document.getElementById("brandChips");
    var all = ["Tümü"].concat(allBrands());
    el.innerHTML = "";
    all.forEach(function(m){
      var b = document.createElement("button");
      b.className = "brand-btn" + (m === activeBrand ? " active" : "");
      b.textContent = m;
      b.onclick = function(){
        activeBrand = m;
        renderBrands();
        renderGrid();
      };
      el.appendChild(b);
    });
  }

  // ---------- KATEGORİ MENÜSÜ ----------
  function renderCats(){
    var el = document.getElementById("cats");
    var all = ["Tümü"].concat(CATEGORIES);
    el.innerHTML = "";
    all.forEach(function(c){
      var b = document.createElement("button");
      b.className = "cat-btn" + (c === activeCat ? " active" : "");
      b.textContent = c;
      b.onclick = function(){
        activeCat = c;
        renderCats();
        renderGrid();
      };
      el.appendChild(b);
    });
  }

  // ---------- ÜRÜN GRID ----------
  function renderGrid(){
    var grid = document.getElementById("grid");
    var empty = document.getElementById("emptyState");
    var title = document.getElementById("sectionTitle");
    title.textContent = (activeCat === "Tümü") ? "Tüm Ürünler" : activeCat + " Ürünleri";

    var list = PRODUCTS.filter(function(p){
      var catOk = activeCat === "Tümü" || p.kategori === activeCat;
      var brandOk = activeBrand === "Tümü" || (p.marka && p.marka.indexOf(activeBrand) !== -1);
      return catOk && brandOk;
    });

    grid.innerHTML = "";
    if(list.length === 0){
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    list.forEach(function(p){
      var card = document.createElement("div");
      card.className = "card";
      card.onclick = function(){ openDetail(p); };

      var img = document.createElement("img");
      img.className = "card-img";
      img.alt = p.baslik;
      img.src = coverOf(p);
      img.onerror = function(){ this.src = phData(p.kategori); };

      var body = document.createElement("div");
      body.className = "card-body";

      var cat = document.createElement("span");
      cat.className = "card-cat";
      cat.textContent = p.kategori;

      var h = document.createElement("div");
      h.className = "card-title";
      h.textContent = p.baslik;

      var d = document.createElement("div");
      d.className = "card-desc";
      d.textContent = p.aciklama || "";

      var pr = document.createElement("div");
      if(p.fiyat && p.fiyat.trim() !== ""){
        pr.className = "card-price";
        pr.textContent = p.fiyat;
      }else{
        pr.className = "card-price empty";
        pr.textContent = "Fiyat için sipariş verin";
      }

      var order = document.createElement("a");
      order.className = "order-btn";
      order.href = waHref(p);
      order.target = "_blank";
      order.rel = "noopener";
      order.innerHTML = WA_ICON + ' Sipariş Ver';
      order.onclick = function(e){ e.stopPropagation(); }; // kart detayını açma

      body.appendChild(cat);
      body.appendChild(h);
      body.appendChild(d);
      body.appendChild(pr);
      body.appendChild(order);

      card.appendChild(img);
      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  // ---------- ÜRÜN DETAY PENCERESİ ----------
  function openDetail(p){
    var img = document.getElementById("detailImg");
    var ph = phData(p.kategori);
    var imgs = imagesOf(p);
    img.src = imgs[0];
    img.onerror = function(){ this.src = ph; };
    img.alt = p.baslik;

    // thumbnail şeridi (birden fazla görsel varsa)
    var thumbs = document.getElementById("detailThumbs");
    thumbs.innerHTML = "";
    if(imgs.length > 1){
      imgs.forEach(function(src, i){
        var t = document.createElement("img");
        t.className = "modal-thumb" + (i === 0 ? " active" : "");
        t.src = src;
        t.alt = p.baslik + " görsel " + (i + 1);
        t.onclick = function(){
          img.src = src;
          var all = thumbs.querySelectorAll(".modal-thumb");
          for(var k = 0; k < all.length; k++){ all[k].className = "modal-thumb"; }
          t.className = "modal-thumb active";
        };
        thumbs.appendChild(t);
      });
    }

    document.getElementById("detailCat").textContent = p.kategori;
    document.getElementById("detailTitle").textContent = p.baslik;
    var pr = document.getElementById("detailPrice");
    if(p.fiyat && p.fiyat.trim() !== ""){
      pr.className = "modal-price"; pr.textContent = p.fiyat;
    }else{
      pr.className = "modal-price empty"; pr.textContent = "Fiyat için sipariş verin";
    }
    document.getElementById("detailDesc").textContent = p.aciklama || "";
    var order = document.getElementById("detailOrder");
    order.href = waHref(p);
    order.innerHTML = WA_ICON + ' Sipariş Ver';
    document.getElementById("detailModal").classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeDetail(){
    document.getElementById("detailModal").classList.remove("open");
    document.body.style.overflow = "";
  }
  document.getElementById("detailClose").onclick = closeDetail;
  document.getElementById("detailModal").onclick = function(e){
    if(e.target === this){ closeDetail(); } // sadece dışına tıklayınca kapat
  };
  document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){ closeDetail(); }
  });

  // ürün linkiyle (#urun=<id>) gelindiyse o ürünün detayını aç
  function openFromHash(){
    var m = location.hash.match(/^#urun=(.+)$/);
    if(!m){ return; }
    var id = decodeURIComponent(m[1]);
    var p = PRODUCTS.filter(function(x){ return x.id === id; })[0];
    if(p){ openDetail(p); }
  }
  window.addEventListener("hashchange", openFromHash);

  // ilk render
  renderCats();
  renderBrands();
  renderGrid();
  openFromHash();
})();
</script>
