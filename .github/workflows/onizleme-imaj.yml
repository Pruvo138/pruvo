# Onizleme derleyici imajini CI'da derle + Cloudflare registry'ye it.
# SADECE ELLE TETIKLENIR (workflow_dispatch) — push'a baglanmaz (imaj sik degismez,
# sir iceren paketi her push'ta cekmek gereksiz yuzey acar).
#
# SIR AKISI: uyelik ureteci .scad'lari ve eslem PUBLIC repoda YOKTUR. CI, paketi
# GIZLI R2 bucket'indan (pruvo-ozel) S3 API'siyle ceker. Gerekli secret'lar:
#   R2_ERISIM_ID / R2_GIZLI_ANAHTAR  — R2 S3 token (pruvo-ozel okuma yetkili)
#   CLOUDFLARE_API_TOKEN             — (mevcut) containers push icin de yetki gerekir
# Secret yoksa adimlar aciklamali sekilde durur; hicbir sir loglanmaz.
#
# PLAN KAPISI: registry push'u Workers PAID plani ister. Plan aktif degilken
# push adimi "PLAN BEKLIYOR" der ve is BASARISIZ sayilmaz (imaj derlemesi yine
# dogrulanir). Plan acilinca ayni workflow yeniden tetiklenir.

name: Onizleme derleyici imaji

on:
  workflow_dispatch:
    inputs:
      push_et:
        description: "Imaji Cloudflare registry'ye it (Workers Paid gerekir)"
        type: boolean
        default: false

jobs:
  imaj:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gizli paketi cek (R2, olmazsa secret)
        env:
          R2_ERISIM_ID: ${{ secrets.R2_ERISIM_ID }}
          R2_GIZLI_ANAHTAR: ${{ secrets.R2_GIZLI_ANAHTAR }}
          # Birincil yol R2: R2_ERISIM_ID/R2_GIZLI_ANAHTAR = pruvo-ozel'e SALT-OKUMA
          # yetkili 'pruvo-ozel-okuma-ci' token'i (16 Tem 2026'da uretildi, dogrulandi).
          # ONIZLEME_PAKET_B64 yedegi ayni gun KALDIRILDI (Okan karari) — asagidaki
          # fallback kodu zararsiz oldugu icin duruyor; secret bos gelir, R2 duserse
          # is aciklamali hata verir (cozum: tools/onizleme-paket-yukle.py + token kontrol).
          ONIZLEME_PAKET_B64: ${{ secrets.ONIZLEME_PAKET_B64 }}
        run: |
          mkdir -p onizleme/derleyici/paket-ozel
          CEKILDI=""
          if [ -n "$R2_ERISIM_ID" ] && [ -n "$R2_GIZLI_ANAHTAR" ]; then
            export AWS_ACCESS_KEY_ID="$R2_ERISIM_ID"
            export AWS_SECRET_ACCESS_KEY="$R2_GIZLI_ANAHTAR"
            export AWS_DEFAULT_REGION=auto
            if aws s3 cp "s3://pruvo-ozel/onizleme/paket-guncel.tar.gz" paket.tar.gz \
              --endpoint-url "https://dbbe2a8620c3c3a57c586b8a98142fb9.r2.cloudflarestorage.com"; then
              CEKILDI="r2"
            else
              echo "::warning::R2'den cekilemedi (kimlik bucket kapsami?) — secret yoluna dusuluyor."
            fi
          fi
          if [ -z "$CEKILDI" ]; then
            if [ -z "$ONIZLEME_PAKET_B64" ]; then
              echo "::error::Paket cekilemedi: ne R2 erisimi ne ONIZLEME_PAKET_B64 secret'i var."
              echo "Cozum: python3 tools/onizleme-paket-yukle.py (R2 + secret'i birlikte tazeler)."
              exit 1
            fi
            printf '%s' "$ONIZLEME_PAKET_B64" | base64 -d > paket.tar.gz
            CEKILDI="secret"
          fi
          tar -xzf paket.tar.gz -C onizleme/derleyici/paket-ozel
          rm paket.tar.gz
          echo "paket kaynagi: $CEKILDI — dosyalar (adlar sir degil, icerik loglanmaz):"
          ls onizleme/derleyici/paket-ozel

      - name: Imaji derle
        run: |
          docker build -t pruvo-onizleme-derleyici:ci onizleme/derleyici
          docker image ls pruvo-onizleme-derleyici:ci

      - name: Imaj duman testi (mock degil — gercek openscad + paket, DOKUZ aile)
        # TUM ailelerin derlenmesi SART: 16 Tem'de tek-aile duman yesilken canli
        # profil ailesi derlenemedi (Debian openscad 2021.01 cok eskiydi) — bu adim
        # o sinifi artik CI'da yakalar. Faz D: konektor/braket/disli eklendi
        # (disli BOSL2 ister — imajdaki sabit surumle derlenebilirligi burada kanitlanir).
        run: |
          docker run -d --rm -p 18080:8080 --name onizleme-duman pruvo-onizleme-derleyici:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/saglik > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:18080/saglik
          echo
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-oring-conta","parametreler":{"ic_cap":30,"kesit_cap":3.6,"profil":"yuvarlak"}}' \
            -o duman-oring.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-profil-beam","parametreler":{"kesit":"i","yukseklik":40,"genislik":30,"et_kalinligi":3,"uzunluk":100,"ic_yapi":"bos"}}' \
            -o duman-beam.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-baglanti-konektor","parametreler":{"kol_sayisi":3,"kol_kesiti":"yuvarlak","cubuk_capi":10,"kol_boyu":25,"cidar":2.5,"gecme":"normal"}}' \
            -o duman-konektor.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-montaj-braketi","parametreler":{"tip":"acili","ic_aci":90,"kalinlik":4,"genislik":20,"uzunluk":40,"delik_adet":2}}' \
            -o duman-braket.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"ozel-disli-kramayer-uretimi","parametreler":{"disli_tipi":"duz","dis_sayisi":40,"modul":1.25,"kalinlik":7,"delik_capi":6}}' \
            -o duman-disli.stl
          # yay ONIZLEME_AILELER'de DEGIL (eslem olcumu %3'u asti) ama scad'lari v3
          # paketinde durur — dumanda derlenebilirligi kanitlanir (worker kapisi ayri).
          # CIFT uretecli (spiral + dalga ayri .scad) — ikisi de derlenir.
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-yay-dalga-flexure","parametreler":{"tip":"spiral","dalga_formu":"sinus","serbest_boy":60,"dis_cap":20,"tel_capi":3,"dalga_boyu":60}}' \
            -o duman-yay-spiral.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-yay-dalga-flexure","parametreler":{"tip":"dalga","dalga_formu":"sinus","serbest_boy":60,"dis_cap":20,"tel_capi":3,"dalga_boyu":60}}' \
            -o duman-yay-dalga.stl
          # Yeni sari aileler 1. dalga (2026-07-17): adaptor + kutu + kavanoz
          # (kavanoz BOSL2 threading ister — imaj surumuyle derlenebilirlik kaniti).
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-hortum-adaptoru","parametreler":{"uc1_cap":38,"uc1_gecme":"ic","uc2_cap":32,"uc2_gecme":"ic","boy":80,"cidar":2.4}}' \
            -o duman-adaptor.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-kutu-organizer","parametreler":{"ic_en":60,"ic_boy":100,"ic_yukseklik":40,"duvar":2,"kapak":"gecme","bolme_sayisi":1}}' \
            -o duman-kutu.stl
          curl -sf -X POST http://127.0.0.1:18080/derle \
            -H 'Content-Type: application/json' \
            -d '{"aile":"olcuye-ozel-vidali-kavanoz-tapa","parametreler":{"urun_tipi":"kavanoz","govde_capi":60,"yukseklik":80,"dis_adimi":2.5,"cidar":2.4}}' \
            -o duman-kavanoz.stl
          wc -c duman-oring.stl duman-beam.stl duman-konektor.stl duman-braket.stl \
            duman-disli.stl duman-yay-spiral.stl duman-yay-dalga.stl \
            duman-adaptor.stl duman-kutu.stl duman-kavanoz.stl
          test -s duman-oring.stl && test -s duman-beam.stl && test -s duman-konektor.stl \
            && test -s duman-braket.stl && test -s duman-disli.stl \
            && test -s duman-yay-spiral.stl && test -s duman-yay-dalga.stl \
            && test -s duman-adaptor.stl && test -s duman-kutu.stl && test -s duman-kavanoz.stl
          docker stop onizleme-duman

      - name: Registry'ye it (PLAN KAPISI)
        if: ${{ inputs.push_et }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Token hesap listeleme iznine sahip degil -> hesap kimligi acikca verilir
          # (deploy.yml d1-sync adimiyla ayni desen; kimlik sir degil).
          CLOUDFLARE_ACCOUNT_ID: dbbe2a8620c3c3a57c586b8a98142fb9
          CF_REGISTRY_GECICI: ${{ secrets.CF_REGISTRY_GECICI }}
        run: |
          HEDEF="registry.cloudflare.com/dbbe2a8620c3c3a57c586b8a98142fb9/pruvo-onizleme-derleyici:ci"
          # YOL 1 — gecici registry kimligi (yerel `wrangler containers registries
          # credentials` cikartir, ~15 dk gecerli, tools/onizleme-paket-yukle.py
          # tetiklemeden hemen once secret'a koyar). Neden: CI'daki CLOUDFLARE_API_TOKEN
          # Containers yetkisi tasimiyor (16 Tem'de "Forbidden" olculdu); token yetki
          # duzenlemesi panel/Okan isi olana kadar bu yol calisir.
          if [ -n "$CF_REGISTRY_GECICI" ]; then
            printf '%s' "$CF_REGISTRY_GECICI" | docker login registry.cloudflare.com -u v1 --password-stdin
            docker tag pruvo-onizleme-derleyici:ci "$HEDEF"
            if docker push "$HEDEF"; then
              echo "imaj itildi (gecici kimlik): $HEDEF"
              exit 0
            fi
            echo "::warning::gecici kimlikle push olmadi (JWT suresi dolmus olabilir) — wrangler yoluna dusuluyor."
          fi
          # YOL 2 — wrangler (CLOUDFLARE_API_TOKEN'a Containers yetkisi eklenince kalici yol).
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN yok — push atlandi."
            exit 0
          fi
          npx wrangler@4 containers push pruvo-onizleme-derleyici:ci 2> push-hata.log \
            && { echo "imaj itildi"; exit 0; } \
            || true
          if grep -qi "Workers Paid" push-hata.log; then
            echo "::warning::PLAN BEKLIYOR — Workers Paid aktif degil, push yapilamadi. Plan acilinca workflow'u push_et=true ile yeniden tetikleyin."
            exit 0
          fi
          echo "::error::containers push beklenmedik sekilde basarisiz:"
          cat push-hata.log
          exit 1

      - name: Push kapali bilgisi
        if: ${{ !inputs.push_et }}
        run: echo "push_et=false — imaj yalniz derlendi/dumani alindi. Registry'ye itmek icin workflow'u push_et=true ile tetikleyin (Workers Paid gerekir)."
