name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Statik sayfalari uret
        run: python3 tools/build.py
      - name: Pages artefaktini yukle
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages'e yayinla
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cloudflare cache temizle
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret yok — cache purge atlandi (Cloudflare edge TTL ile ~5 dk icinde yenilenir)."
            exit 0
          fi
          sleep 10   # Pages origin'in yeni icerigi sunmasi icin kisa bekleme
          echo "Cloudflare cache temizleniyor (purge_everything)..."
          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/d3a78b8c8ce2a25c127bf02e728ac7b1/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
