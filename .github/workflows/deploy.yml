name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Node: piksel<->katalog parite testinin JS-uc nobeti (index.html pruvoFeedId + olcum.js
      # feedId/metaGovdesi/ga4Govdesi) node ile kosar. FAIL-CLOSED: node yoksa test CI'da exit 1
      # verir (yalanci-yesil olamaz), o yuzden setup-node BLOKLAYICI bir on-kosuldur.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Kisisel veri sizinti kilidi — BILEREK BLOKLAYICI (continue-on-error YOK;
      # mukerrer-hook felsefesi): bu test kirmiziysa kisisel veri ham HTML'e siziyor
      # demektir, yayini erken durdurmak ucuz, sessiz sizinti pahali. JSON-LD
      # istisnasi testin icinde tanimli.
      - name: Kisisel veri korumasi testi
        run: python3 tools/kisisel-veri-test.py

      # CATEGORIES / gizli-kategori / WHATSAPP sipariş no'su index.html ile build.py arasında
      # elle senkron tutulur; drift = ana sayfa/ürün sayfası tutarsızlığı ya da siparişin YANLIŞ
      # numaraya gitmesi (kayıp satış). Bloklayıcı (kisisel-veri deseni): drift'te yayını erken durdur.
      - name: Kategori/WHATSAPP parite testi (drift guard)
        run: python3 tools/kategori-parite-test.py

      # ODEME BEYANI: statik yasal sayfalardaki siparis/odeme anlatimi canli akisla uyumlu mu
      # (kart formu/iframe yok, teslim suresi, wa.me/tel numara ayrimi). Bloklayici: uyumsuzluk
      # = musteriye yanlis odeme/teslim beyani. Offline, commit'li sayfalari okur (build.py'den ONCE).
      - name: Odeme beyani kapisi
        run: python3 tools/odeme-beyani-kapisi.py

      # R2 GORSEL ANAHTARI: anahtar KAYNAK-ID'den turetilir (basliktan DEGIL) — turetme tek
      # modulde (tools/r2_anahtar.py) toplandi, cagiranlar ondan gecer. Bloklayici: anahtar
      # basliga kayarsa iki urun ayni R2 nesnesini EZER (sessiz gorsel kaybi). Offline, yazma yok.
      - name: R2 anahtar turetme kabul testi
        run: python3 tools/r2-anahtar-test.py

      # DUZELT --toplu: mesru toplu duzeltme yolu (guard'in tek kapisi). Bloklayici: toplu kip
      # kilit/atomiklik kaybederse paralel yazicilar urun kaydi EZER. Test gercek urunler.json'a
      # DOKUNMAZ (tempfile'da sahte repo kurar), ag yok.
      - name: duzelt.py --toplu kabul testi
        run: python3 tools/duzelt-toplu-test.py

      # LANDING/HUKUK KAPISI: huni (landing) sayfasindaki ticari beyanlar ile baglayici yasal
      # sayfalarin (kapsam + revizyon/cayma cercevesi) uyumu. Bloklayici (odeme-beyani deseni):
      # uyumsuzluk = musteriye yanlis hukuki beyan. Offline, build.py'den ONCE kosar.
      - name: Landing/hukuk beyan kapisi
        run: python3 tools/landing-hukuk-kapisi.py

      # MALZEME DAYANAGI: huni (landing) sayfalarinda VE ege-bilgi.md'de (WhatsApp botu Ege'nin
      # bilgi dosyasi) gecen her malzeme adinin filament envanterinde karsiligi var mi —
      # uretemedigimiz bir malzeme sinifini (or. PC / polikarbonat) sayfada ya da bot metninde
      # vaat etmek yanlis ticari beyandir. Bloklayici (landing-hukuk deseni). Offline, stdlib,
      # olculdu 2,8 s; build.py'den ONCE commit'li sayfa kaynagini + ege-bilgi.md'yi okur.
      - name: Malzeme dayanak kabul testi (landing sayfalari + ege-bilgi.md)
        run: python3 tools/malzeme-dayanak-test.py

      # EGE-BILGI TAVAN: ege-bilgi.md karakter sayisi bot slice(0,6000) esigini asmasin.
      # Bloklayici: >6000 -> bot metni SESSIZCE kesip botun gozunden icerik kaybeder;
      # >5900 -> erken alarm (pay 100 karakter altinda). Offline, stdlib, ~0 s.
      - name: Ege-bilgi tavan kabul testi (6000 karakter kesme kapisi)
        run: python3 tools/ege-bilgi-tavan-test.py

      # ENJEKSIYON KAPISI: build.py'nin sayfalara inline bastigi JS (attribution/riza + meta)
      # bayt-bayt bozulmadan mi gidiyor. Yasanmis hata: re.sub REPLACEMENT kacisi yorumlayinca
      # ya JS string'i kiriliyor (sayfa acilir, script SESSIZCE hic calismaz) ya da build tumden
      # cokuyor. Bloklayici; tam build kosmaz (fonksiyonlari dogrudan cagirir), olculdu 8,5 s.
      - name: Enjeksiyon kapisi (inline JS bozulmadan mi basiliyor)
        run: python3 tools/enjeksiyon-kapisi.py

      # STL R2 YUKLEYICI: anahtar turetme (yol-gezinme kapisi: ../ , mutlak yol, ters bolu,
      # NUL reddedilir) + 300 MiB ustu cok-parcali (multipart) yolun parca boyutu/sayisi ve
      # kabul mantigi. Bloklayici: anahtar kacarsa yanlis R2 prefix'ine yazilir, multipart
      # esik/parca hesabi kayarsa buyuk STL sessizce BOZUK yuklenir. Offline (gercek R2
      # yazmasi YOK, kimlik okumaz), olculdu ~1 s; build.py'den ONCE kosar.
      - name: STL R2 anahtar/multipart kabul testi
        run: python3 tools/stl-r2-anahtar-test.py

      # PIKSEL <-> KATALOG PARITE: Meta/Google katalog feed g:id ile tarayici/CAPI pikselinin
      # content_ids'i AYNI KURALDAN (build.feed_id) turer mi. Yasanmis hata: feed uzun urun id'sini
      # <=50 karaktere kisaltirken piksel TAM pid gonderiyordu -> 610/7769 urunde katalog eslesmiyor
      # (Advantage+ kor calisir). Bloklayici: sablon content_ids feed g:id'den saparsa katalog reklami
      # yanlis urun gosterir. Offline (render_product'i cagirir, ag yok); JS-uc paritesi icin
      # setup-node kurulu; node yoksa adim FAIL eder (fail-closed).
      - name: Piksel <-> katalog parite kapisi
        run: python3 tools/piksel-katalog-parite-test.py

      # FEED POLITIKA KAPISI — IKI KATMANLI. Merchant feed'inin <title> VE <description>
      # metinlerini tarar. BLOKLAYICI katman YALNIZ olculmus/bildirilmis GERCEK Merchant
      # reddinden turemis 5 jeton icerir (e-sigara/vape/durbun ailesi); tam katalogda 8
      # isabet, YANLIS-POZITIF 0 (olculdu 2026-07-22). Bilinen borc tools/feed-politika-
      # taban.json'da (tek yazar MaCiT, KOD DEGISIKLIGI GEREKTIRMEDEN guncellenir);
      # tabanda OLMAYAN yeni bir ihlal ya da tabandaki bir urunun YENI jeton kazanmasi
      # KIRMIZI yakar. Supheli ama kanitsiz jetonlar (kullук/cakmak/susturucu — bunlar
      # mesru Turkce otomotiv parca adlaridir, olculdu: 71 yanlis pozitif) RAPOR katmaninda
      # yalniz SAYILIR, CI'yi KIRMAZ. Offline (feed'i build.py'yi MODUL olarak import edip
      # uretir), olculdu 2,6 s.
      - name: Feed politika jetonu kapisi (bloklayici + rapor)
        run: python3 tools/feed-politika-kapisi.py

      # FEED g:id COZUCU: Merchant panelinden gelen KISALTILMIS g:id (50 karakter kurali)
      # gercek urun id'sine geri cozulebiliyor mu. Bloklayici degil ama regresyon nobetcisi:
      # cozum bozulursa panel sikayetleri yine "boyle urun yok / 404" gibi gorunur (yasanmis
      # tanilama koru). Offline (ag nobetcisi testin icinde), olculdu 0,4 s.
      - name: Feed g:id cozucu kabul testi
        run: python3 tools/feed-id-cozucu-test.py

      # ASGARI GORSEL BOYUTU: 100x100 altindaki gorsel Google Merchant'ta "resim cok kucuk"
      # reddi alir (olculen vaka 1000x88). Kapinin KENDISI ekleme hattinda kosar (CI'da
      # 7769 gorseli agdan cekmek kabul edilemez); burada kosan sadece onun OFFLINE kabul
      # testidir (sentetik fikstur, saf Python baslik ayristirma). Test uc ekleme betigini
      # GERCEKTEN import edip process_one'i sahte upload ile uctan uca kosturur (ag/AI/sips
      # yok, urunler.json'a DOKUNMAZ) -> kablolama kopmasi sessiz kalamaz. Olculdu 2,1 s.
      - name: Asgari gorsel boyutu kapisi kabul testi
        run: python3 tools/gorsel-boyut-test.py

      # NOBETCI MUTASYON HARNESS: yukaridaki iki kapinin KENDISINI olcer — bozulunca GERCEKTEN
      # kirmizi yaniyorlar mi. Feed politika kapisinin kirmizi CIKIS YOLU ve _kendini_dogrula()
      # hicbir testle korunmuyordu; olculdu: <title> bulucusunu olduren mutasyon eski kapida
      # exit 0 veriyordu (gercek bir vape urunu SESSIZCE geciyordu). 13 kapi mutasyonu + 3
      # gorsel-kablolama mutasyonu kosulur, hepsi KIRMIZI yanmali; mutasyonsuz kontrol kosumu
      # YESIL yanmali (harness "hep kirmizi" olamaz). Mutasyon DAIMA gecici SYMLINK aynasina
      # uygulanir — canli tools/ dizinine YAZMA YOK. Offline, urunler.json OKUNMAZ (sentetik
      # katalog), olculdu 18,3 s.
      - name: Nobetci mutasyon harness'i (kapilar bozulunca kirmizi yaniyor mu)
        run: python3 tools/nobetci-mutasyon-test.py

      # CI KAPSAM KAPISI: repodaki her IZLENEN kabul testi ya bu is akisinda kosulur ya da
      # tools/ci-kapsam-test.py IZIN_LISTESI'nde gerekceyle muaf tutulur. Yeni bir test sessizce
      # CI-disi kalirsa (olu nobetci CI'dan success alirsa) bu adim KIRMIZI yanar. Offline.
      - name: CI kapsam kapisi (her kabul testi kosuluyor mu / gerekceli muaf mi)
        run: python3 tools/ci-kapsam-test.py

      - name: Statik sayfalari uret
        run: python3 tools/build.py

      # SADECE sitenin ihtiyac duydugu dosyalar yayina girer (beyaz liste).
      # Eskiden path: . tum repoyu yayinliyordu -> tools/*.py canli siteden
      # indirilebiliyordu (ic araclar + ticari mahremiyet; denetim 2026-07-15).
      - name: Yayin klasorunu topla (beyaz liste)
        run: |
          mkdir _site
          # Ana sayfa: build.py'nin urettigi YAYIN kopyasi (script src'leri ?v=<hash>
          # ile onbellek-kirici surumlu). KAYNAK index.html yayina girmez.
          cp index.built.html _site/index.html
          # ozet.json = FAZ 3 ilk-boyama dosyasi (build.py render_ozet uretir). Bayrak
          # (index.html EDGE_KATALOG) KAPALIYKEN site onu cekmez; yine de yayina girer ki
          # bayrak acildigi an dosya CDN'de hazir olsun (eklenmeseydi bayrak acilinca
          # ana sayfa 404 alip bos kalirdi).
          cp secenekler.js urunler.json ozet.json CNAME ege-bilgi.md robots.txt sitemap.xml merchant-feed.xml filament-veri.js taban-fiyatlar.js .nojekyll _site/
          cp -r urun _site/
          # Icerik/yasal sayfa dizinleri: build.py'nin urettigi _yayin-icerik-dizinleri.txt'ten
          # (TEK KAYNAK sayfalar.py SITEMAP_SLUGS) kopyalanir -> yeni CONTENT_PAGES otomatik
          # yayina girer, elle beyaz-liste tutulmaz (eskiden buraya eklenmeyen sayfa sessizce 404'tu).
          if [ ! -s _yayin-icerik-dizinleri.txt ]; then echo "HATA: _yayin-icerik-dizinleri.txt bos/yok (build.py kosmadi mi?)"; exit 1; fi
          while IFS= read -r slug; do
            if [ -z "$slug" ]; then continue; fi
            if [ ! -d "$slug" ]; then echo "HATA: icerik dizini yok: $slug"; exit 1; fi
            cp -r "$slug" "_site/$slug"
          done < _yayin-icerik-dizinleri.txt
          # Parametrik konfigurator varliklari — SADECE public dosyalar (test/ girmez):
          # hacim.js tek kaynak (kabul testi #4), semalar Worker'in ileride sunucu-tarafi
          # yeniden hesabi icin de ayni adresten okunur.
          mkdir _site/jenerator
          cp jenerator/hacim.js jenerator/konfigurator.js jenerator/viewer.js _site/jenerator/
          cp -r jenerator/urunler _site/jenerator/urunler
      - name: Pages artefaktini yukle
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Katalogu D1'e senkronla (Ege'nin aramasi + ileride site aramasi buradan).
      # DIFF-UPSERT: sadece degisen/yeni urunler yazilir (D1 gunluk 100.000 yazma siniri;
      # olculdu: urun basina 5 satir -> tam rebuild 6.086 urunde 30.432 yazma, 50k'da 250.000
      # = limitin 2,5 kati. Degismeyen urune dokunulmaz, tipik push birkac yuz yazma eder).
      # continue-on-error: D1 senkronu SITE YAYININI BLOKLAMAZ — site urunler.json'dan calisir,
      # D1 sadece Ege'nin aramasini besler. Senkron kacarsa bir sonraki push'ta kendini toparlar.
      - name: Katalogu D1'e senkronla
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: dbbe2a8620c3c3a57c586b8a98142fb9
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret yok — D1 senkronu atlandi."
            exit 0
          fi
          python3 tools/d1-sync.py

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages'e yayinla
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cloudflare cache temizle
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret yok — cache purge atlandi (Cloudflare edge TTL ile ~5 dk icinde yenilenir)."
            exit 0
          fi
          sleep 10   # Pages origin'in yeni icerigi sunmasi icin kisa bekleme
          echo "Cloudflare cache temizleniyor (purge_everything)..."
          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/d3a78b8c8ce2a25c127bf02e728ac7b1/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
