# pruvo-shop — self-servis satin alma worker'i (iyzico Checkout Form, hosted/redirect).
# Is paketi: tools/paket-shop-odeme.md. Ege worker'indan (pruvo-bot) TAMAMEN AYRI:
# ayri worker, ayri secret seti; ortak olan tek sey pruvo-katalog D1 veritabani.
name = "pruvo-shop"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Site Cloudflare proxy arkasinda (GitHub Pages origin) -> odeme API'si AYNI alan adindan
# /api/shop/* ile sunulur: CORS gerekmez, front'a workers.dev adresi gomulmez.
routes = [
  { pattern = "pruvo3d.com/api/shop/*", zone_name = "pruvo3d.com" }
]

[vars]
# Canliya gecis: Okan'in iyzico basvurusu onaylaninca burasi https://api.iyzipay.com olur
# + IYZICO_API_KEY/IYZICO_SECRET_KEY secret'lari canli anahtarlarla degistirilir + smoke test.
IYZICO_BASE_URL = "https://api.iyzipay.com"
SITE_URL = "https://pruvo3d.com"
# Telegram bildirimi — Ege worker'iyla ayni sohbet (kimlik/ID sir degil, token SIR).
TELEGRAM_CHAT = "5076274057"
TELEGRAM_API = "https://api.telegram.org"
# HAVALE/EFT alici bilgileri (Okan, 16 Tem gece; IBAN mod-97 dogrulandi — mimar + muhendis).
# SIR DEGIL: musteri ekraninda zaten gosterilir; TEK kaynak burasi (koda/HTML'e dagitilmaz;
# ayni adla secret TANIMLANMASIN — vars+secret cakismasi deploy'u dusurur). Deger BOSLUKSUZ
# tutulur (kopyala dugmesi bunu kopyalar, banka uygulamalari bosluklu IBAN'i reddedebiliyor);
# musteri ekrani 4'lu gruplarla okunur bicimde gosterir.
HAVALE_IBAN = "TR090006701000000059703630"
HAVALE_UNVAN = "Okan Gemalmaz"
# Siparis yonetimi paketi: satici e-posta kopyasi (SIR DEGIL). Onay/kargo e-postalarinin
# BILDIRIM kopyasi buraya gider.
BILDIRIM_EPOSTA = "info@pruvo3d.com"
# Parametrik STL uretimi: onizleme worker'inin ic uc tabani (ayni zone; ayni alan adindan).
ONIZLEME_TABAN = "https://pruvo3d.com"
# REKLAM ROI OLCUMU (reklam-roi-sistemi.md Faz 0). Meta piksel ID'si SIR DEGIL (tarayici
# pikseline de gomulur) -> [vars]'ta. CAPI TOKEN'i ve GA4 API SECRET'i SIR -> asagida secret put.
# META_CAPI_TOKEN yoksa Meta hedefi sessizce atlanir; GA4_MEASUREMENT_ID+GA4_API_SECRET yoksa
# GA4 hedefi atlanir (kod merge olur, canliyi bozmaz; Okan secret basinca canlanir).
META_PIXEL_ID = "1562627655518274"
# GA4 measurement id (G-XXXXXXXXXX) SIR DEGIL — GA4 kurulunca Okan bu satiri doldurur
# (yoksa GA4 hedefi no-op). api_secret ise SIR (secret put).
GA4_MEASUREMENT_ID = "G-5V53CQMSCE"

[[d1_databases]]
binding = "KATALOG"
database_name = "pruvo-katalog"
database_id = "3d99d15e-2342-4c23-9c2d-cb266f19c1ee"

# IP basina rate-limit (POST /api/shop/ref beacon kota korumasi — src/ref.js kotaAsildi).
# Native Cloudflare rate limiting binding: EK D1 YAZMASI YAPMAZ (kota sorununu kota harcamaz).
# Cap = IP basina 20 istek / 60 sn (period yalniz 10 veya 60 kabul eder). SIR YOK, secret YOK.
# Kod fail-open: binding gelene kadar (bu satirlar deploy edilene kadar) beacon eski gibi calisir;
# canlanmasi icin Okan `npx wrangler deploy` (shop dizininden / -c ile) calistirmali — DEPLOY = OKAN.
[[unsafe.bindings]]
name = "REF_RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Uretim dosyalari (STL/3MF) OZEL R2 kovasinda (pruvo-media DEGIL — ticari dosya public'e
# sizmaz). Yonetim /stl ucu SALT-OKUMA ile stream eder; toplu yukleme tools/stl-r2-yukle.py.
[[r2_buckets]]
binding = "OZEL_DOSYA"
bucket_name = "pruvo-ozel"

[observability]
enabled = true

# GIZLI degiskenler wrangler.toml'a YAZILMAZ (repo PUBLIC); komutla eklenir:
#   npx wrangler secret put IYZICO_API_KEY      # sandbox-... / canli anahtar
#   npx wrangler secret put IYZICO_SECRET_KEY
#   npx wrangler secret put TELEGRAM_TOKEN      # mevcut PRUVO botunun token'i — deploy'da Okan onayiyla
#   npx wrangler secret put YONET_ANAHTAR       # openssl rand -hex 24 (yonetim sayfasi anahtari)
#   npx wrangler secret put RESEND_API_KEY      # Resend e-posta (Okan hesabi acinca)
#   npx wrangler secret put IC_DERLE_ANAHTAR    # onizleme worker'iyla AYNI deger (parametrik STL)
#   npx wrangler secret put META_CAPI_TOKEN     # Meta Events Manager > Conversions API > token (reklam ROI)
#   npx wrangler secret put GA4_API_SECRET      # GA4 Admin > Data Streams > Measurement Protocol API secret
# Opsiyonel canli-kabul (dogrulama bitince SILINIR — normalde TANIMLI DEGIL):
#   npx wrangler secret put META_TEST_EVENT_CODE  # Meta Test Events sekmesindeki kod (TESTxxxxx)
#   npx wrangler secret put GA4_DEBUG             # "1" -> GA4 DebugView + /debug/mp/collect dogrulama
# Yerel gelistirme: .dev.vars (gitignore'da) — sablon: .dev.vars.example
